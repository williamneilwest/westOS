services:
  frontend:
    env_file:
      - ./.env
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - "${FRONTEND_PORT:-5173}"
    networks:
      - westos

  backend:
    env_file:
      - ./.env
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${BACKEND_FLASK_ENV:-production}
      GUNICORN_BIND: ${BACKEND_GUNICORN_BIND:-0.0.0.0:5000}
      APP_NAME: ${BACKEND_APP_NAME:-westOS API}
      BACKEND_DATA_DIR: ${BACKEND_DATA_DIR:-/app/data}
      FRONTEND_STATUS_URL: http://frontend:${FRONTEND_PORT:-5173}
      AI_GATEWAY_STATUS_URL: http://backend:${BACKEND_PORT:-5000}/api/ai/health
      USE_AI_GATEWAY: ${USE_AI_GATEWAY:-false}
      AI_GATEWAY_BASE_URL: http://ai-gateway:${AI_GATEWAY_PORT:-5001}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    expose:
      - "${BACKEND_PORT:-5000}"
    volumes:
      - backend_data:/app/data
    networks:
      - westos

  ai-gateway:
    env_file:
      - ./.env
    build:
      context: ./ai-gateway
    container_name: ai-gateway
    restart: unless-stopped
    environment:
      FLASK_ENV: ${AI_FLASK_ENV:-production}
      GUNICORN_BIND: ${AI_GUNICORN_BIND:-0.0.0.0:5001}
      GUNICORN_TIMEOUT: ${AI_GUNICORN_TIMEOUT:-180}
      GUNICORN_GRACEFUL_TIMEOUT: ${AI_GUNICORN_GRACEFUL_TIMEOUT:-30}
      APP_NAME: ${AI_APP_NAME:-westOS AI Gateway}
      LITELLM_MODEL: ${LITELLM_MODEL:-ollama/llama3.2}
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE:-0.2}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS:-512}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
    expose:
      - "${AI_GATEWAY_PORT:-5001}"
    networks:
      - westos

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./services/ollama:/root/.ollama
    networks:
      - westos

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_AUTH: "False"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - westos

  caddy:
    env_file:
      - ./.env
    image: caddy:2.8.4
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-gateway
      - ollama
      - open-webui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - westos

networks:
  westos:
    name: westos

volumes:
  backend_data:
  caddy_data:
  caddy_config:
  open_webui_data:
