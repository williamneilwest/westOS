services:
  code-server:
    image: codercom/code-server
    container_name: code-server
    restart: unless-stopped
    user: "1000:1000"
    environment:
      PASSWORD_FILE: /run/secrets/code_server_password
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - export PASSWORD="$$(cat /run/secrets/code_server_password)"; exec /usr/bin/entrypoint.sh --bind-addr 0.0.0.0:8080 --auth password /home/will/westos
    working_dir: /home/will/westos
    labels:
      app: devtools
      service: code-server
      env: dev
    volumes:
      - ./code-server:/home/coder/.config/code-server
      - ..:/home/will/westos
    secrets:
      - code_server_password
    networks:
      - westos

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    labels:
      app: devtools
      service: portainer
      env: dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    networks:
      - westos

  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    restart: unless-stopped
    environment:
      FB_NOAUTH: "false"
    labels:
      app: devtools
      service: filebrowser
      env: dev
    command:
      - --address
      - 0.0.0.0
      - --port
      - "80"
      - --root
      - /srv
      - --database
      - /database/filebrowser.db
      - --config
      - /database/.filebrowser.json
    volumes:
      - /home/will:/srv
      - ./filebrowser:/database
    networks:
      - westos

networks:
  westos:
    external: true

secrets:
  code_server_password:
    file: ./code-server/password.txt
